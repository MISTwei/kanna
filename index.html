<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的网站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fa;
      color: #333;
    }

    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 24px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      opacity: 0.7;
    }

    .hero {
      height: 400px;
      background: url('https://oss-console-img-demo-cn-hangzhou.oss-cn-hangzhou.aliyuncs.com/example.jpg') center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .hero h2 {
      font-size: 40px;
      background: rgba(0,0,0,0.4);
      padding: 20px 40px;
      border-radius: 10px;
    }

    .container {
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #5a67d8;
    }

  </style>
</head>
<body>

<header>
  <h1>我的网站</h1>
  <nav>
    <a href="#">首页</a>
    <a href="#">关于</a>
    <a href="#">服务</a>
    <a href="#">联系</a>
  </nav>
</header>

<section class="hero">
  <h2>欢迎来到我的网站</h2>
</section>

<div class="container">
  <h2>我们的功能</h2>
  <div class="cards">

    <div class="card">
      <h3>功能 1</h3>
      <p>这是一个示例功能介绍。</p>
      <button onclick="alert('点击成功')">点击</button>
    </div>

    <div class="card">
      <h3>功能 2</h3>
      <p>支持手机和电脑访问。</p>
      <button onclick="alert('Hello World')">点击</button>
    </div>

    <div class="card">
      <h3>功能 3</h3>
      <p>可以部署到服务器或OSS。</p>
      <button onclick="changeTitle()">改变标题</button>
    </div>

  </div>
</div>

<footer>
  © 2026 我的网站. All Rights Reserved.
</footer>

<script>
  function changeTitle() {
    document.querySelector('.hero h2').innerText = '标题已改变！';
  }
</script>

</body>
</html>
